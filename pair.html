<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DAVE-X — Pair Code</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    *, *::before, *::after {
      margin: 0; padding: 0; box-sizing: border-box;
    }

    :root {
      --blue: #0079F2;
      --blue-light: #3b9eff;
      --blue-glow: rgba(0, 121, 242, 0.35);
      --pink: #F059DA;
      --pink-light: #f580e4;
      --pink-glow: rgba(240, 89, 218, 0.35);
      --red: #ff4d6a;
      --bg: #0d0d14;
      --surface: rgba(18, 18, 30, 0.88);
      --border: rgba(255, 255, 255, 0.07);
      --text: #e8e8f0;
      --muted: rgba(232, 232, 240, 0.45);
    }

    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: var(--bg);
      font-family: 'Inter', sans-serif;
      color: var(--text);
      overflow-x: hidden;
    }

    #bg-canvas {
      position: fixed; inset: 0;
      z-index: 0; pointer-events: none;
    }

    .card {
      position: relative;
      z-index: 2;
      width: 90%;
      max-width: 440px;
      padding: 3rem 2.2rem 2.2rem;
      background: var(--surface);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border-radius: 24px;
      border: 1px solid var(--border);
      box-shadow:
        0 0 0 1px rgba(255,255,255,0.04),
        0 24px 80px rgba(0,0,0,0.7),
        0 0 60px rgba(0,121,242,0.06),
        0 0 80px rgba(240,89,218,0.04);
      overflow: hidden;
    }

    .card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 2px;
      background: linear-gradient(90deg, var(--blue), var(--pink), var(--blue-light), var(--pink), var(--blue));
      background-size: 300% 100%;
      animation: shimmer 5s linear infinite;
    }

    @keyframes shimmer {
      0%   { background-position: 0% 0%; }
      100% { background-position: 300% 0%; }
    }

    .header {
      text-align: center;
      margin-bottom: 2rem;
    }

    .icon-wrap {
      width: 62px;
      height: 62px;
      border-radius: 18px;
      background: linear-gradient(135deg, var(--blue), var(--pink));
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.6rem;
      color: #fff;
      margin: 0 auto 1.2rem;
      box-shadow: 0 0 30px var(--blue-glow), 0 0 20px var(--pink-glow);
      animation: iconPulse 3s ease-in-out infinite;
    }

    @keyframes iconPulse {
      0%, 100% { box-shadow: 0 0 30px var(--blue-glow), 0 0 20px var(--pink-glow); }
      50%       { box-shadow: 0 0 48px rgba(0,121,242,0.55), 0 0 36px rgba(240,89,218,0.45); }
    }

    .title {
      font-size: 1.45rem;
      font-weight: 800;
      letter-spacing: -0.3px;
      background: linear-gradient(90deg, var(--blue-light), var(--pink-light));
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      margin-bottom: 0.5rem;
    }

    .subtitle {
      font-size: 0.88rem;
      font-weight: 400;
      color: var(--muted);
      line-height: 1.7;
    }

    .divider {
      width: 100%;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.08), transparent);
      margin-bottom: 1.8rem;
    }

    .input-label {
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 0.8px;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 0.55rem;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .input-label i {
      color: var(--blue-light);
    }

    .input-group {
      display: flex;
      border-radius: 14px;
      overflow: hidden;
      border: 1px solid rgba(255,255,255,0.1);
      background: rgba(255,255,255,0.03);
      transition: border-color 0.25s, box-shadow 0.25s;
      margin-bottom: 1.2rem;
    }

    .input-group:focus-within {
      border-color: rgba(0,121,242,0.5);
      box-shadow: 0 0 0 3px rgba(0,121,242,0.12);
    }

    .input-prefix {
      padding: 0 14px;
      display: flex;
      align-items: center;
      font-size: 0.95rem;
      color: var(--blue-light);
      border-right: 1px solid rgba(255,255,255,0.07);
      background: rgba(0,121,242,0.06);
    }

    .input-group input {
      flex: 1;
      padding: 0.9rem 1rem;
      background: transparent;
      border: none;
      outline: none;
      color: var(--text);
      font-family: 'Inter', sans-serif;
      font-size: 0.95rem;
      font-weight: 500;
    }

    .input-group input::placeholder {
      color: rgba(232, 232, 240, 0.25);
    }

    .btn-submit {
      width: 100%;
      padding: 0.95rem;
      border-radius: 14px;
      border: none;
      background: linear-gradient(135deg, var(--blue), #005dc4);
      color: #fff;
      font-family: 'Inter', sans-serif;
      font-size: 0.92rem;
      font-weight: 700;
      letter-spacing: 0.4px;
      cursor: pointer;
      position: relative;
      overflow: hidden;
      transition: transform 0.2s, box-shadow 0.2s;
      box-shadow: 0 4px 24px rgba(0,121,242,0.4);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .btn-submit::after {
      content: '';
      position: absolute;
      top: 0; left: -100%;
      width: 100%; height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.12), transparent);
      transition: left 0.4s ease;
    }

    .btn-submit:hover {
      transform: translateY(-3px);
      box-shadow: 0 8px 36px rgba(0,121,242,0.55);
    }

    .btn-submit:hover::after { left: 100%; }
    .btn-submit:active { transform: translateY(-1px) scale(0.99); }
    .btn-submit:disabled { opacity: 0.55; cursor: not-allowed; transform: none; }

    .status-wrap {
      margin-top: 1.4rem;
      min-height: 56px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .code-result {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }

    .code-box {
      width: 100%;
      padding: 1.2rem 1.4rem;
      border-radius: 14px;
      background: rgba(0,121,242,0.07);
      border: 1px solid rgba(0,121,242,0.2);
      text-align: center;
      position: relative;
      overflow: hidden;
    }

    .code-label {
      font-size: 0.7rem;
      font-weight: 600;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 0.5rem;
    }

    .code-value {
      font-size: 1.7rem;
      font-weight: 800;
      letter-spacing: 6px;
      background: linear-gradient(90deg, var(--blue-light), var(--pink-light));
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      animation: codeGlow 2s ease-in-out infinite;
    }

    @keyframes codeGlow {
      0%, 100% { filter: brightness(1); }
      50%       { filter: brightness(1.2); }
    }

    .code-actions {
      display: flex;
      gap: 0.6rem;
      width: 100%;
    }

    .code-btn {
      flex: 1;
      padding: 0.75rem 0.6rem;
      border-radius: 12px;
      border: none;
      font-family: 'Inter', sans-serif;
      font-size: 0.8rem;
      font-weight: 700;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      transition: transform 0.2s, box-shadow 0.2s, filter 0.2s;
      letter-spacing: 0.2px;
    }

    .code-btn-copy {
      background: linear-gradient(135deg, var(--blue), #005dc4);
      color: #fff;
      box-shadow: 0 4px 18px rgba(0,121,242,0.4);
    }

    .code-btn-copy:hover { transform: translateY(-2px); box-shadow: 0 8px 26px rgba(0,121,242,0.55); filter: brightness(1.08); }

    .code-btn-copy.copied {
      background: linear-gradient(135deg, #22c55e, #16a34a);
      box-shadow: 0 4px 18px rgba(34,197,94,0.4);
    }

    .code-btn-new {
      background: rgba(240,89,218,0.12);
      border: 1px solid rgba(240,89,218,0.25) !important;
      color: var(--pink-light);
    }

    .code-btn-new:hover { background: rgba(240,89,218,0.2); transform: translateY(-2px); }

    .code-btn-home {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1) !important;
      color: var(--muted);
    }

    .code-btn-home:hover { background: rgba(255,255,255,0.09); transform: translateY(-2px); color: var(--text); }

    .code-btn:active { transform: translateY(-1px) scale(0.98); }

    .msg {
      width: 100%;
      padding: 0.9rem 1.2rem;
      border-radius: 14px;
      font-size: 0.88rem;
      font-weight: 500;
      text-align: center;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .msg.error {
      background: rgba(255, 77, 106, 0.1);
      border: 1px solid rgba(255, 77, 106, 0.22);
      color: #ff7a90;
    }

    .msg.info {
      background: rgba(0,121,242,0.08);
      border: 1px solid rgba(0,121,242,0.2);
      color: var(--blue-light);
    }

    .spinner {
      width: 26px; height: 26px;
      border: 2.5px solid rgba(255,255,255,0.1);
      border-top-color: var(--blue-light);
      border-right-color: var(--pink);
      border-radius: 50%;
      animation: spin 0.75s linear infinite;
      margin: 0 auto;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .footer {
      margin-top: 2rem;
      padding-top: 1rem;
      border-top: 1px solid var(--border);
      text-align: center;
      font-size: 0.75rem;
      color: var(--muted);
    }

    .footer span {
      background: linear-gradient(90deg, var(--blue-light), var(--pink-light));
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      font-weight: 600;
    }

    @media (max-width: 480px) {
      .card { padding: 2rem 1.2rem 1.6rem; }
    }
  </style>
</head>
<body>
  <canvas id="bg-canvas"></canvas>

  <div class="card">
    <div class="header">
      <div class="icon-wrap"><i class="fas fa-plug"></i></div>
      <h1 class="title">PAIR CODE</h1>
      <p class="subtitle">Enter your WhatsApp number with country code<br>to receive a pairing code instantly.</p>
    </div>

    <div class="divider"></div>

    <p class="input-label"><i class="fas fa-phone-alt"></i> Phone Number</p>
    <div class="input-group">
      <span class="input-prefix"><i class="fas fa-hashtag"></i></span>
      <input type="tel" id="phone" placeholder="254712345678" inputmode="numeric">
    </div>

    <button class="btn-submit" id="submit-btn">
      <i class="fas fa-paper-plane"></i> Get Pair Code
    </button>

    <div class="status-wrap" id="status"></div>

    <div class="footer">
      DAVE-X &copy; 2025 &mdash; <span>Secure</span> WhatsApp Session Generator
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/axios/1.0.0-alpha.1/axios.min.js"></script>
  <script>
    const canvas = document.getElementById('bg-canvas');
    const ctx    = canvas.getContext('2d');
    let W, H, particles = [];

    const COLORS = [[0,121,242],[59,158,255],[240,89,218],[245,128,228]];

    function resize() { W = canvas.width = innerWidth; H = canvas.height = innerHeight; }

    function makeParticle() {
      const c = COLORS[Math.floor(Math.random() * COLORS.length)];
      return { x: Math.random()*W, y: Math.random()*H, r: Math.random()*1.4+0.4,
               vx: (Math.random()-0.5)*0.3, vy: (Math.random()-0.5)*0.3,
               alpha: Math.random()*0.4+0.1, color: c };
    }

    function init() { resize(); particles = Array.from({length:100}, makeParticle); }

    function loop() {
      ctx.clearRect(0, 0, W, H);
      for (let i=0; i<particles.length; i++) {
        const p = particles[i];
        p.x += p.vx; p.y += p.vy;
        if (p.x<0||p.x>W||p.y<0||p.y>H) { Object.assign(p, makeParticle()); p.x=Math.random()*W; p.y=Math.random()*H; }
        for (let j=i+1; j<particles.length; j++) {
          const q=particles[j];
          const dx=p.x-q.x, dy=p.y-q.y, d=Math.sqrt(dx*dx+dy*dy);
          if (d<110) {
            ctx.beginPath();
            ctx.strokeStyle=`rgba(${p.color[0]},${p.color[1]},${p.color[2]},${0.06*(1-d/110)})`;
            ctx.lineWidth=0.6; ctx.moveTo(p.x,p.y); ctx.lineTo(q.x,q.y); ctx.stroke();
          }
        }
        ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
        ctx.fillStyle=`rgba(${p.color[0]},${p.color[1]},${p.color[2]},${p.alpha})`; ctx.fill();
      }
      requestAnimationFrame(loop);
    }

    window.addEventListener('resize', resize);
    init(); loop();

    const phoneInput = document.getElementById('phone');
    const submitBtn  = document.getElementById('submit-btn');
    const statusEl   = document.getElementById('status');

    function setStatus(html) { statusEl.innerHTML = html; }

    async function copyCode(rawCode) {
      try {
        await navigator.clipboard.writeText(rawCode);
        const btn = document.getElementById('copy-btn');
        if (btn) {
          btn.classList.add('copied');
          btn.innerHTML = '<i class="fas fa-check"></i> Copied!';
          setTimeout(() => {
            btn.classList.remove('copied');
            btn.innerHTML = '<i class="fas fa-copy"></i> Copy Code';
          }, 2000);
        }
      } catch (_) {}
    }

    function renderCode(code) {
      setStatus(`
        <div class="code-result">
          <div class="code-box">
            <div class="code-label">Your Pair Code</div>
            <div class="code-value">${code}</div>
          </div>
          <div class="code-actions">
            <button id="copy-btn" class="code-btn code-btn-copy" onclick="copyCode('${code}')">
              <i class="fas fa-copy"></i> Copy Code
            </button>
            <button class="code-btn code-btn-new" onclick="document.getElementById('submit-btn').click(); document.getElementById('status').innerHTML='';">
              <i class="fas fa-sync-alt"></i> New Code
            </button>
            <button class="code-btn code-btn-home" onclick="window.location.href='/'">
              <i class="fas fa-home"></i>
            </button>
          </div>
        </div>`);
    }

    submitBtn.addEventListener('click', async () => {
      const raw = phoneInput.value.replace(/[^0-9]/g, '');
      if (!raw) {
        return setStatus('<div class="msg error"><i class="fas fa-exclamation-circle"></i>Enter your WhatsApp number with country code.</div>');
      }
      if (raw.length < 10) {
        return setStatus('<div class="msg error"><i class="fas fa-exclamation-circle"></i>Number seems too short. Include your country code.</div>');
      }

      submitBtn.disabled = true;
      setStatus('<div class="spinner"></div>');

      try {
        const { data } = await axios(`/code?number=${raw}`);
        const code = data.code || 'Unavailable';
        if (code.toLowerCase().includes('unavailable')) {
          setStatus('<div class="msg error"><i class="fas fa-times-circle"></i>Service temporarily unavailable. Please retry.</div>');
        } else {
          renderCode(code);
        }
      } catch (_) {
        setStatus('<div class="msg error"><i class="fas fa-times-circle"></i>Request failed. Check your connection and retry.</div>');
      } finally {
        submitBtn.disabled = false;
      }
    });

    phoneInput.addEventListener('keydown', e => { if (e.key === 'Enter') submitBtn.click(); });
  </script>
</body>
</html>
