<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>JUNE-X SESSION</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --green: #00ffaa;
      --blue: #0088ff;
      --purple: #8800ff;
      --dark: #020c1b;
      --card: rgba(8, 22, 46, 0.75);
      --border: rgba(0, 255, 170, 0.18);
    }

    html, body {
      width: 100%;
      min-height: 100vh;
    }

    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: var(--dark);
      font-family: 'Rajdhani', sans-serif;
      color: #cde8e0;
      overflow-x: hidden;
    }

    /* ── Canvas BG ── */
    #bg-canvas {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
    }

    /* ── Scanlines ── */
    .scanlines {
      position: fixed;
      inset: 0;
      z-index: 1;
      pointer-events: none;
      background: repeating-linear-gradient(
        to bottom,
        transparent 0px,
        transparent 3px,
        rgba(0, 255, 170, 0.025) 3px,
        rgba(0, 255, 170, 0.025) 4px
      );
    }

    /* ── Card ── */
    .card {
      position: relative;
      z-index: 2;
      width: 90%;
      max-width: 720px;
      padding: 3rem 2.5rem 2rem;
      background: var(--card);
      backdrop-filter: blur(18px);
      border-radius: 20px;
      border: 1px solid var(--border);
      box-shadow:
        0 0 40px rgba(0,255,170,0.08),
        0 20px 60px rgba(0,0,0,0.6);
      overflow: hidden;
    }

    /* top accent bar */
    .card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 3px;
      background: linear-gradient(90deg, var(--purple), var(--green), var(--blue), var(--green), var(--purple));
      background-size: 300% 100%;
      animation: barShimmer 4s linear infinite;
    }

    @keyframes barShimmer {
      0%   { background-position: 0% 0%; }
      100% { background-position: 300% 0%; }
    }

    /* corner brackets */
    .card::after {
      content: '';
      position: absolute;
      bottom: 0; right: 0;
      width: 60px; height: 60px;
      border-bottom: 2px solid rgba(0,255,170,0.25);
      border-right: 2px solid rgba(0,255,170,0.25);
      border-radius: 0 0 20px 0;
    }

    .corner-tl {
      position: absolute;
      top: 0; left: 0;
      width: 60px; height: 60px;
      border-top: 2px solid rgba(0,255,170,0.25);
      border-left: 2px solid rgba(0,255,170,0.25);
      border-radius: 20px 0 0 0;
      z-index: 3;
    }

    /* ── Logo / Title ── */
    .logo-wrap {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 14px;
      margin-bottom: 0.4rem;
    }

    .logo-icon {
      width: 52px;
      height: 52px;
      border-radius: 14px;
      background: linear-gradient(135deg, var(--green), var(--blue));
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.5rem;
      color: #020c1b;
      box-shadow: 0 0 20px rgba(0,255,170,0.4);
      animation: logoPulse 3s ease-in-out infinite;
    }

    @keyframes logoPulse {
      0%, 100% { box-shadow: 0 0 20px rgba(0,255,170,0.4); }
      50%       { box-shadow: 0 0 35px rgba(0,255,170,0.7), 0 0 60px rgba(0,136,255,0.3); }
    }

    .title {
      font-family: 'Orbitron', sans-serif;
      font-size: clamp(1.6rem, 5vw, 2.6rem);
      font-weight: 900;
      letter-spacing: 4px;
      background: linear-gradient(90deg, var(--green) 0%, var(--blue) 50%, var(--green) 100%);
      background-size: 200% 100%;
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      animation: titleFlow 5s linear infinite;
    }

    @keyframes titleFlow {
      0%   { background-position: 0% 0%; }
      100% { background-position: 200% 0%; }
    }

    .badge {
      display: inline-block;
      background: rgba(0,255,170,0.12);
      border: 1px solid rgba(0,255,170,0.3);
      border-radius: 100px;
      padding: 4px 14px;
      font-size: 0.75rem;
      font-weight: 700;
      letter-spacing: 2px;
      color: var(--green);
      text-transform: uppercase;
      margin: 0.8rem auto 2rem;
      text-align: center;
      display: table;
    }

    /* ── Divider ── */
    .divider {
      width: 100%;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--border), transparent);
      margin-bottom: 2rem;
    }

    /* ── Subtitle ── */
    .subtitle {
      text-align: center;
      font-size: 1.05rem;
      font-weight: 400;
      color: rgba(205, 232, 224, 0.7);
      margin-bottom: 2rem;
      line-height: 1.7;
    }

    /* ── Buttons ── */
    .buttons {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 1.2rem;
      width: 100%;
    }

    .btn {
      position: relative;
      width: 200px;
      padding: 1rem 1.4rem;
      border-radius: 12px;
      border: 1px solid rgba(0,255,170,0.25);
      background: rgba(0,255,170,0.06);
      color: #cde8e0;
      font-family: 'Rajdhani', sans-serif;
      font-size: 0.95rem;
      font-weight: 700;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      cursor: pointer;
      overflow: hidden;
      transition: transform 0.25s ease, box-shadow 0.25s ease, border-color 0.25s ease;
    }

    .btn i {
      margin-right: 8px;
    }

    .btn .btn-glow {
      position: absolute;
      inset: 0;
      border-radius: 12px;
      background: linear-gradient(135deg, var(--green), var(--blue));
      opacity: 0;
      transition: opacity 0.3s ease;
      z-index: -1;
    }

    .btn:hover {
      transform: translateY(-4px);
      border-color: var(--green);
      box-shadow: 0 8px 28px rgba(0,255,170,0.25);
      color: #020c1b;
    }

    .btn:hover .btn-glow {
      opacity: 1;
    }

    .btn:active {
      transform: translateY(-2px) scale(0.98);
    }

    .btn.pulse {
      animation: btnPulse 2.5s ease-in-out infinite;
    }

    @keyframes btnPulse {
      0%, 100% { box-shadow: 0 0 0 0 rgba(0,255,170,0.35); }
      50%       { box-shadow: 0 0 0 8px rgba(0,255,170,0); }
    }

    /* ── Footer ── */
    .footer {
      margin-top: 2.5rem;
      padding-top: 1.2rem;
      border-top: 1px solid var(--border);
      text-align: center;
      font-size: 0.82rem;
      color: rgba(205, 232, 224, 0.45);
      letter-spacing: 1px;
    }

    .footer span {
      color: var(--green);
    }

    /* ── Responsive ── */
    @media (max-width: 560px) {
      .card {
        padding: 2.2rem 1.4rem 1.6rem;
      }
      .btn {
        width: 100%;
        max-width: 300px;
      }
      .buttons {
        flex-direction: column;
        align-items: center;
      }
    }
  </style>
</head>
<body>
  <canvas id="bg-canvas"></canvas>
  <div class="scanlines"></div>

  <div class="card">
    <div class="corner-tl"></div>

    <div class="logo-wrap">
      <div class="logo-icon"><i class="fas fa-robot"></i></div>
      <h1 class="title">JUNE-X</h1>
    </div>

    <div class="badge">Session Generator</div>
    <div class="divider"></div>

    <p class="subtitle">
      Generate a secure WhatsApp session ID for your bot.<br>
      Choose your preferred authentication method below.
    </p>

    <div class="buttons">
      <button onclick="window.open('/pair')" class="btn pulse">
        <span class="btn-glow"></span>
        <i class="fas fa-link"></i> Pair Code
      </button>
      <button onclick="window.open('/qr')" class="btn">
        <span class="btn-glow"></span>
        <i class="fas fa-qrcode"></i> QR Scan
      </button>
      <button onclick="window.open('https://github.com/vinpink2/JUNE-X/fork')" class="btn">
        <span class="btn-glow"></span>
        <i class="fab fa-github"></i> Fork Repo
      </button>
    </div>

    <div class="footer">
      JUNE-X &copy; 2025 &mdash; <span>Secure</span> &bull; <span>Fast</span> &bull; <span>Open Source</span>
    </div>
  </div>

  <script>
    // Spiral glow canvas background
    const canvas = document.getElementById('bg-canvas');
    const ctx = canvas.getContext('2d');
    let W, H, t = 0;

    const SPIRALS = [
      { arms: 3, speed: 0.0018, radius: 0.42, hue: 160, hueShift: 40,  width: 1.8, alpha: 0.55, dir:  1 },
      { arms: 4, speed: 0.0012, radius: 0.36, hue: 200, hueShift: 50,  width: 1.4, alpha: 0.45, dir: -1 },
      { arms: 2, speed: 0.0025, radius: 0.28, hue: 270, hueShift: 60,  width: 1.2, alpha: 0.38, dir:  1 },
      { arms: 5, speed: 0.0010, radius: 0.50, hue: 180, hueShift: 30,  width: 0.9, alpha: 0.28, dir: -1 },
    ];

    const GLOWS = [
      { ox: -0.25, oy: -0.22, r: 0.32, color: [0, 255, 170],   alpha: 0.18 },
      { ox:  0.28, oy:  0.20, r: 0.28, color: [0, 136, 255],   alpha: 0.16 },
      { ox:  0.00, oy:  0.00, r: 0.20, color: [123, 47, 255],  alpha: 0.22 },
      { ox: -0.30, oy:  0.28, r: 0.22, color: [0, 210, 255],   alpha: 0.12 },
      { ox:  0.32, oy: -0.25, r: 0.24, color: [0, 255, 130],   alpha: 0.13 },
    ];

    function resize() {
      W = canvas.width  = window.innerWidth;
      H = canvas.height = window.innerHeight;
    }

    function drawGlows() {
      const cx = W / 2, cy = H / 2;
      const base = Math.min(W, H);
      GLOWS.forEach((g, i) => {
        const pulse = 0.85 + 0.15 * Math.sin(t * 0.8 + i * 1.3);
        const gr = ctx.createRadialGradient(
          cx + g.ox * base, cy + g.oy * base, 0,
          cx + g.ox * base, cy + g.oy * base, g.r * base * pulse
        );
        const [r, gg, b] = g.color;
        gr.addColorStop(0,   `rgba(${r},${gg},${b},${g.alpha * pulse})`);
        gr.addColorStop(0.5, `rgba(${r},${gg},${b},${g.alpha * 0.4 * pulse})`);
        gr.addColorStop(1,   `rgba(${r},${gg},${b},0)`);
        ctx.fillStyle = gr;
        ctx.beginPath();
        ctx.ellipse(
          cx + g.ox * base, cy + g.oy * base,
          g.r * base * pulse, g.r * base * 0.85 * pulse,
          i * 0.6, 0, Math.PI * 2
        );
        ctx.fill();
      });
    }

    function drawSpiral(s, offset) {
      const cx = W / 2, cy = H / 2;
      const maxR = Math.min(W, H) * s.radius;
      const turns = 4.5;
      const steps = 320;

      for (let arm = 0; arm < s.arms; arm++) {
        const armAngle = (Math.PI * 2 / s.arms) * arm;

        ctx.beginPath();
        let first = true;

        for (let i = 0; i <= steps; i++) {
          const frac  = i / steps;
          const angle = frac * turns * Math.PI * 2 * s.dir + armAngle + offset;
          const r     = frac * maxR;
          const x     = cx + Math.cos(angle) * r;
          const y     = cy + Math.sin(angle) * r;

          if (first) { ctx.moveTo(x, y); first = false; }
          else ctx.lineTo(x, y);
        }

        const hue  = (s.hue + arm * (360 / s.arms) + t * 30) % 360;
        const hue2 = (hue + s.hueShift) % 360;

        ctx.shadowBlur  = 18;
        ctx.shadowColor = `hsla(${hue},100%,65%,0.6)`;
        ctx.strokeStyle = `hsla(${hue2},100%,70%,${s.alpha})`;
        ctx.lineWidth   = s.width;
        ctx.stroke();
        ctx.shadowBlur  = 0;
      }
    }

    function draw() {
      ctx.clearRect(0, 0, W, H);

      drawGlows();

      const time = t;
      SPIRALS.forEach((s, i) => {
        drawSpiral(s, time * s.speed * Math.PI * 2 * 1000 + i);
      });

      t += 0.012;
      requestAnimationFrame(draw);
    }

    window.addEventListener('resize', resize);
    resize();
    draw();
  </script>
</body>
</html>
