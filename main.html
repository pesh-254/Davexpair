<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>DAVE-X Session Generator</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    *, *::before, *::after {
      margin: 0; padding: 0; box-sizing: border-box;
    }

    :root {
      --blue: #0079F2;
      --blue-light: #3b9eff;
      --blue-glow: rgba(0, 121, 242, 0.35);
      --pink: #F059DA;
      --pink-light: #f580e4;
      --pink-glow: rgba(240, 89, 218, 0.35);
      --bg: #0d0d14;
      --surface: rgba(18, 18, 30, 0.85);
      --border: rgba(255, 255, 255, 0.07);
      --text: #e8e8f0;
      --muted: rgba(232, 232, 240, 0.45);
    }

    html, body {
      width: 100%; min-height: 100vh;
    }

    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: var(--bg);
      font-family: 'Inter', sans-serif;
      color: var(--text);
      overflow-x: hidden;
    }

    #bg-canvas {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
    }

    .card {
      position: relative;
      z-index: 2;
      width: 90%;
      max-width: 680px;
      padding: 3rem 2.5rem 2.2rem;
      background: var(--surface);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border-radius: 24px;
      border: 1px solid var(--border);
      box-shadow:
        0 0 0 1px rgba(255,255,255,0.04),
        0 24px 80px rgba(0,0,0,0.7),
        0 0 60px rgba(0,121,242,0.06),
        0 0 80px rgba(240,89,218,0.04);
      overflow: hidden;
    }

    .card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 2px;
      background: linear-gradient(90deg, var(--blue), var(--pink), var(--blue-light), var(--pink), var(--blue));
      background-size: 300% 100%;
      animation: shimmer 5s linear infinite;
    }

    @keyframes shimmer {
      0%   { background-position: 0% 0%; }
      100% { background-position: 300% 0%; }
    }

    .logo-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 16px;
      margin-bottom: 0.5rem;
    }

    .logo-icon {
      width: 56px;
      height: 56px;
      border-radius: 16px;
      background: linear-gradient(135deg, var(--blue), var(--pink));
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.5rem;
      color: #fff;
      box-shadow: 0 0 28px var(--blue-glow), 0 0 20px var(--pink-glow);
      animation: iconPulse 3s ease-in-out infinite;
      flex-shrink: 0;
    }

    @keyframes iconPulse {
      0%, 100% { box-shadow: 0 0 28px var(--blue-glow), 0 0 20px var(--pink-glow); }
      50%       { box-shadow: 0 0 45px rgba(0,121,242,0.55), 0 0 35px rgba(240,89,218,0.45); }
    }

    .title {
      font-size: clamp(2rem, 6vw, 2.8rem);
      font-weight: 900;
      letter-spacing: -0.5px;
      background: linear-gradient(90deg, var(--blue-light), var(--pink-light), var(--blue-light));
      background-size: 200% 100%;
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      animation: titleFlow 6s linear infinite;
      line-height: 1;
    }

    @keyframes titleFlow {
      0%   { background-position: 0% 0%; }
      100% { background-position: 200% 0%; }
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: rgba(240, 89, 218, 0.1);
      border: 1px solid rgba(240, 89, 218, 0.25);
      border-radius: 100px;
      padding: 5px 14px;
      font-size: 0.72rem;
      font-weight: 600;
      letter-spacing: 1.5px;
      color: var(--pink-light);
      text-transform: uppercase;
      margin: 1rem auto 0;
      width: fit-content;
    }

    .badge-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--pink);
      box-shadow: 0 0 8px var(--pink);
      animation: blink 2s ease-in-out infinite;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.4; }
    }

    .divider {
      width: 100%;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--border), rgba(255,255,255,0.08), var(--border), transparent);
      margin: 2rem 0;
    }

    .subtitle {
      text-align: center;
      font-size: 1rem;
      font-weight: 400;
      color: var(--muted);
      margin-bottom: 2rem;
      line-height: 1.8;
    }

    .buttons {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 1rem;
    }

    .btn {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      width: 190px;
      padding: 0.9rem 1.4rem;
      border-radius: 14px;
      border: 1px solid rgba(255,255,255,0.1);
      background: rgba(255,255,255,0.04);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      font-size: 0.88rem;
      font-weight: 600;
      letter-spacing: 0.3px;
      cursor: pointer;
      overflow: hidden;
      transition: transform 0.2s ease, box-shadow 0.2s ease, border-color 0.2s ease, background 0.2s ease;
    }

    .btn-primary {
      background: linear-gradient(135deg, var(--blue), #0063c8);
      border-color: rgba(0,121,242,0.4);
      box-shadow: 0 4px 20px rgba(0,121,242,0.3);
      animation: btnPulse 2.5s ease-in-out infinite;
    }

    @keyframes btnPulse {
      0%, 100% { box-shadow: 0 4px 20px rgba(0,121,242,0.3); }
      50%       { box-shadow: 0 4px 30px rgba(0,121,242,0.55); }
    }

    .btn-secondary {
      background: linear-gradient(135deg, rgba(240,89,218,0.15), rgba(240,89,218,0.05));
      border-color: rgba(240,89,218,0.25);
    }

    .btn-ghost {
      background: rgba(255,255,255,0.03);
      border-color: rgba(255,255,255,0.08);
    }

    .btn::after {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: 14px;
      background: rgba(255,255,255,0.08);
      opacity: 0;
      transition: opacity 0.2s;
    }

    .btn:hover {
      transform: translateY(-3px);
    }

    .btn:hover::after {
      opacity: 1;
    }

    .btn-primary:hover {
      box-shadow: 0 8px 32px rgba(0,121,242,0.5);
    }

    .btn-secondary:hover {
      box-shadow: 0 8px 28px rgba(240,89,218,0.3);
    }

    .btn:active {
      transform: translateY(-1px) scale(0.98);
    }

    .footer {
      margin-top: 2.2rem;
      padding-top: 1.2rem;
      border-top: 1px solid var(--border);
      text-align: center;
      font-size: 0.78rem;
      color: var(--muted);
      letter-spacing: 0.3px;
    }

    .footer span {
      background: linear-gradient(90deg, var(--blue-light), var(--pink-light));
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      font-weight: 600;
    }

    @media (max-width: 560px) {
      .card { padding: 2.2rem 1.4rem 1.8rem; }
      .btn  { width: 100%; max-width: 300px; }
      .buttons { flex-direction: column; align-items: center; }
    }
  </style>
</head>
<body>
  <canvas id="bg-canvas"></canvas>

  <div class="card">
    <div class="logo-row">
      <div class="logo-icon"><i class="fas fa-robot"></i></div>
      <h1 class="title">DAVE-X</h1>
    </div>

    <div class="badge">
      <span class="badge-dot"></span>
      Session Generator
    </div>

    <div class="divider"></div>

    <p class="subtitle">
      Generate a secure WhatsApp session ID for your bot.<br>
      Choose your preferred authentication method below.
    </p>

    <div class="buttons">
      <button onclick="window.open('/pair')" class="btn btn-primary">
        <i class="fas fa-link"></i> Pair Code
      </button>
      <button onclick="window.open('/qr')" class="btn btn-secondary">
        <i class="fas fa-qrcode"></i> QR Scan
      </button>
      <button onclick="window.open('https://github.com')" class="btn btn-ghost">
        <i class="fab fa-github"></i> Fork Repo
      </button>
    </div>

    <div class="footer">
      DAVE-X &copy; 2025 &mdash; <span>Secure</span> &bull; <span>Fast</span> &bull; <span>Reliable</span>
    </div>
  </div>

  <script>
    const canvas = document.getElementById('bg-canvas');
    const ctx = canvas.getContext('2d');
    let W, H, particles = [];

    function resize() {
      W = canvas.width  = window.innerWidth;
      H = canvas.height = window.innerHeight;
    }

    const COLORS = [
      [0, 121, 242],
      [59, 158, 255],
      [240, 89, 218],
      [245, 128, 228],
    ];

    function makeParticle() {
      const c = COLORS[Math.floor(Math.random() * COLORS.length)];
      return {
        x: Math.random() * W,
        y: Math.random() * H,
        r: Math.random() * 1.6 + 0.4,
        vx: (Math.random() - 0.5) * 0.3,
        vy: (Math.random() - 0.5) * 0.3,
        alpha: Math.random() * 0.45 + 0.1,
        color: c,
      };
    }

    function init() {
      resize();
      particles = Array.from({ length: 120 }, makeParticle);
    }

    function loop() {
      ctx.clearRect(0, 0, W, H);

      for (let i = 0; i < particles.length; i++) {
        const p = particles[i];
        p.x += p.vx; p.y += p.vy;
        if (p.x < 0 || p.x > W || p.y < 0 || p.y > H) {
          Object.assign(p, makeParticle());
          p.x = Math.random() * W;
          p.y = Math.random() * H;
        }
        for (let j = i + 1; j < particles.length; j++) {
          const q = particles[j];
          const dx = p.x - q.x, dy = p.y - q.y;
          const d  = Math.sqrt(dx * dx + dy * dy);
          if (d < 120) {
            const a = 0.05 * (1 - d / 120);
            ctx.beginPath();
            ctx.strokeStyle = `rgba(${p.color[0]},${p.color[1]},${p.color[2]},${a})`;
            ctx.lineWidth = 0.6;
            ctx.moveTo(p.x, p.y);
            ctx.lineTo(q.x, q.y);
            ctx.stroke();
          }
        }
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(${p.color[0]},${p.color[1]},${p.color[2]},${p.alpha})`;
        ctx.fill();
      }

      requestAnimationFrame(loop);
    }

    window.addEventListener('resize', resize);
    init();
    loop();
  </script>
</body>
</html>
